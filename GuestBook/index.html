<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">

    <!-- My CSS -->
    <link rel="stylesheet" href="style.css">

    <title>Kelompok 2 - Guest Book</title>
    <link rel="icon" href="../img/logo.png">
  </head>
  <body>
    
    <!-- Form -->
		<section id="form" class="form">
			<div class="jumbotron jumbotron-fluid">
			  <div class="container">
          <div class="text-center">
            <img src="img/logogb.png" class="rounded-circle" alt="logo"">
          </div>
          <div class="row d-flex justify-content-center">
            <div class="col-sm-12 col-md-9 col-lg-8">
              <div class="card">
                <div class="card-body">
                  <form>
                    <!-- Name -->
                    <div class="form-group">
                      <label for="name">Name</label>
                      <div class="row">
                        <div class="col">
                          <input type="text" class="form-control" id="name" placeholder="First name">
                        </div>
                        <div class="col">
                          <input type="text" class="form-control" id="name" placeholder="Last name">
                        </div>
                      </div>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                      <label for="email">Email</label>
                      <input type="email" class="form-control" id="email" placeholder="name@example.com">
                    </div>

                    <!-- Address -->
                    <div class="form-group">
                      <label for="address">Address</label>
                      <input type="email" class="form-control" id="address" placeholder="Jl. Pegangsaan Timur 56">
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
			  </div>
			</div>
		</section>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
  </body>
</html>
